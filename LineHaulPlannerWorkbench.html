const TimelineSparkline = ({ data, color }) => {
  const max = Math.max(...data);
  return (
    <div style={{ display:"flex", alignItems:"flex-end", gap:2, height:24, marginTop:8 }}>
      {data.map((v, i) => (
        <div key={i} style={{ flex:1, height:`${(v / max) * 100}%`, background: i === data.length - 1 ? color : `${color}66`, borderRadius:1, minHeight:2, transition:"height .3s" }} />
      ))}
    </div>
  );
};

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <div>
          <span style={{ fontSize:14, fontWeight:600, color:C.text }}>Triggered Tasks</span>
          <span style={{ fontSize:12, color:C.textMuted, marginLeft:8 }}>{triggeredTasks.length} tasks</span>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <select value={sourceFilter} onChange={e => setSourceFilter(e.target.value)}
            style={{ background:C.surface, border:`1px solid ${C.cardBorder}`, borderRadius:6, color:C.text, padding:"5px 10px", fontSize:12 }}>
            <option value="All">All Sources</option><option>Rule</option><option>Manual</option>
          </select>
          <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}
            style={{ background:C.surface, border:`1px solid ${C.cardBorder}`, borderRadius:6, color:C.text, padding:"5px 10px", fontSize:12 }}>
            <option value="All">All Status</option><option>Pending Review</option><option>In Progress</option><option>Completed</option><option>Rejected</option>
          </select>
        </div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"90px 120px 200px 100px 120px 100px 110px", padding:"8px 16px", gap:8, marginBottom:4 }}>
        {["Priority","Trigger","Scope","Period","Due Date","Status","Source Rule"].map(h => (
          <span key={h} style={{ fontSize:11, fontWeight:600, color:C.textMuted, textTransform:"uppercase", letterSpacing:.5 }}>{h}</span>
        ))}
      </div>
      {filtered.map(t => (
        <TaskRow key={t.id} item={t} expanded={expandedId===t.id} onClick={() => setExpandedId(expandedId===t.id?null:t.id)} />
      ))}
    </div>
  );
};

const AutoTriggerModel = () => {
  const [subTab, setSubTab] = useState("Rule Engine");
  return (
    <div style={{ padding:24 }}>
      <SectionHeader title="Auto-trigger Model" subtitle="Configure trigger rules, run manual optimizations, and manage triggered tasks" />
      <SubTabBar tabs={["Rule Engine", "Manual Trigger", "Triggered Tasks"]} active={subTab} setActive={setSubTab} />
      {subTab === "Rule Engine" && <RuleEngineTab />}
      {subTab === "Manual Trigger" && <ManualTriggerTab />}
      {subTab === "Triggered Tasks" && <TriggeredTasksTab />}
    </div>
  );
};

// ── App ──

const App = () => {
  const [activeTab, setActiveTab] = useState("Anomaly Monitor");
  return (
    <div style={{ minHeight:"100vh", background:C.bg }}>
      <TopBar activeTab={activeTab} setActiveTab={setActiveTab} notifCount={3} />
      {activeTab === "Anomaly Monitor" && <AnomalyMonitoring />}
      {activeTab === "Config Center" && <ConfigurationCenter />}
      {activeTab === "Auto-trigger Model" && <AutoTriggerModel />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
